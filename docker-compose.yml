services:
  app:
    image: python:3.12-slim
    container_name: realestate_chatbot
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
