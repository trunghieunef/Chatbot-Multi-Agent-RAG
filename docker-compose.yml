services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: realestate_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realestate}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realestate_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-realestate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline-worker:
    build:
      context: .
      dockerfile: pipeline_worker/Dockerfile
    container_name: realestate_pipeline_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-realestate_secret_2026}@postgres:5432/${POSTGRES_DB:-realestate}
      REDIS_URL: redis://redis:6379/0
      AGENT_INTERNAL_KEY: ${AGENT_INTERNAL_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-BAAI/bge-m3}
      INTENT_EXTRACTOR: ${INTENT_EXTRACTOR:-rule}
      CHATBOT_EMBEDDING_LOCAL_FILES_ONLY: ${CHATBOT_EMBEDDING_LOCAL_FILES_ONLY:-true}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8200/internal/pipeline/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realestate_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-service:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-realestate_secret_2026}@postgres:5432/${POSTGRES_DB:-realestate}
      REDIS_URL: redis://redis:6379/0
      AGENT_SERVICE_URL: http://agent-service:8100
      AGENT_INTERNAL_KEY: ${AGENT_INTERNAL_KEY}
      CHATBOT_AGENT_SERVICE_ENABLED: ${CHATBOT_AGENT_SERVICE_ENABLED:-true}
    volumes:
      - ./data:/app/data

  agent-service:
    build:
      context: .
      dockerfile: agent_service/Dockerfile
    container_name: realestate_agent_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-realestate_secret_2026}@postgres:5432/${POSTGRES_DB:-realestate}
      REDIS_URL: redis://redis:6379/0
      AGENT_INTERNAL_KEY: ${AGENT_INTERNAL_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_JUDGE_MODEL: ${GEMINI_JUDGE_MODEL:-gemini-2.0-flash}
      AGENT_ROUTER_MODE: ${AGENT_ROUTER_MODE:-hybrid}
      AGENT_QUERY_REWRITE_ENABLED: ${AGENT_QUERY_REWRITE_ENABLED:-true}
      AGENT_SPECIALIST_LLM_ENABLED: ${AGENT_SPECIALIST_LLM_ENABLED:-true}
      AGENT_MEMORY_FILTERS_ENABLED: ${AGENT_MEMORY_FILTERS_ENABLED:-true}
      AGENT_LLM_COST_TRACKING_ENABLED: ${AGENT_LLM_COST_TRACKING_ENABLED:-true}
      AGENT_AGENTIC_MODE: ${AGENT_AGENTIC_MODE:-true}
      AGENT_CHECKPOINT_ENABLED: ${AGENT_CHECKPOINT_ENABLED:-true}
      AGENT_CHECKPOINT_PATH: /app/data/checkpoints/agent_graph.db
      AGENT_TOOL_RETRY_MAX: ${AGENT_TOOL_RETRY_MAX:-3}
      AGENT_STREAM_ENABLED: ${AGENT_STREAM_ENABLED:-true}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Internal-Agent-Key: $$AGENT_INTERNAL_KEY\" http://localhost:8100/internal/agent/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: realestate_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      INTERNAL_API_URL: http://backend:8000

  # ================================================================
  # Monitoring Stack
  # ================================================================

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: realestate_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: realestate_alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:11.3.0
    container_name: realestate_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: realestate_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-realestate_secret_2026}@postgres:5432/${POSTGRES_DB:-realestate}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.64.0
    container_name: realestate_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  # ================================================================
  # Nginx Reverse Proxy + SSL
  # ================================================================

  nginx:
    image: nginx:1.27-alpine
    container_name: realestate_nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./infra/nginx/certbot/www:/var/www/certbot:ro
      - ./infra/nginx/certbot/conf:/etc/letsencrypt:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: realestate_certbot
    volumes:
      - ./infra/nginx/certbot/www:/var/www/certbot
      - ./infra/nginx/certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  prometheus_data:
  grafana_data:
