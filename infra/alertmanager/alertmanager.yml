# ============================================================
# RealEstate Chatbot v2 — AlertManager Configuration
# ============================================================
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: warning
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: "${SLACK_WEBHOOK_URL}"
        send_resolved: true
        max_alerts: 5

  - name: critical
    webhook_configs:
      - url: "${SLACK_WEBHOOK_URL}"
        send_resolved: true
        max_alerts: 10

  - name: warning
    webhook_configs:
      - url: "${SLACK_WEBHOOK_URL}"
        send_resolved: true
        max_alerts: 10

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
